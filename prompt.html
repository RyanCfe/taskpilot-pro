<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TaskPilot Prompt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-body">
  <main class="prompt-page">
    <header class="hero">
      <p class="eyebrow">TaskPilot Right-Click Action</p>
      <h1>Your prompt is ready.</h1>
      <p class="sub">Copy it, then paste into the opened AI tool.</p>
    </header>
    <div class="prompt-box">
      <p class="label">Prompt</p>
      <textarea id="promptOut"></textarea>
      <div class="button-row">
        <button id="copyBtn">Copy Prompt</button>
        <button id="openToolBtn" class="secondary">Open Tool</button>
      </div>
    </div>
    <div class="prompt-box">
      <p class="label">Selected text</p>
      <textarea id="selectedText" readonly></textarea>
    </div>
  </main>
  <div id="toast" class="toast">Copied!</div>
  <script src="prompt_page.js"></script>
</body>
</html>
